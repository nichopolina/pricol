<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>3D Heart Pro</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  perspective: 1000px;
}

/* зовнішній контейнер (авто-обертання) */
#outer {
  width: 400px;
  height: 400px;
  transform-style: preserve-3d;
  animation: autoRotate 12s infinite linear;
}

/* внутрішній контейнер (мишка) */
#inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.word {
  position: absolute;
  color: #ff4d6d;
  font-family: Arial, sans-serif;
  font-size: 14px;
  white-space: nowrap;
  text-shadow: 0 0 10px #ff4d6d;
}

@keyframes autoRotate {
  0% { transform: rotateY(0deg) rotateX(10deg); }
  100% { transform: rotateY(360deg) rotateX(10deg); }
}
</style>
</head>

<body>

<div id="outer">
  <div id="inner"></div>
</div>

<script>
const container = document.getElementById("inner");

// формула серця
function heart(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: 13 * Math.cos(t)
      - 5 * Math.cos(2*t)
      - 2 * Math.cos(3*t)
      - Math.cos(4*t)
  };
}

// створюємо текст
for (let i = 0; i < 250; i++) {
  const t = Math.random() * Math.PI * 2;
  const p = heart(t);

  const word = document.createElement("div");
  word.className = "word";
  word.innerText = "you are loh";

  const scale = 12;
  const z = (Math.random() - 0.5) * 200;

  word.style.left = 200 + p.x * scale + "px";
  word.style.top = 200 - p.y * scale + "px";
  word.style.transform = `translateZ(${z}px)`;

  container.appendChild(word);
}

// рух мишкою (внутрішній контейнер)
document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 40;
  const y = (e.clientY / window.innerHeight - 0.5) * 40;

  container.style.transform = `
    rotateY(${x}deg)
    rotateX(${-y}deg)
  `;
});
</script>

</body>
</html>
